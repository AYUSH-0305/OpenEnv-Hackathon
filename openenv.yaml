spec_version: 1
name: med_reconciliation
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: "easy"
    grader: "graders.task_graders:EasyGrader"
    name: "Easy — Exact Duplicate"
    description: "Patient on warfarin has it listed twice in the discharge prescription. Agent must identify the duplicate before it causes fatal internal bleeding."
    difficulty: "easy"

  - id: "medium"
    grader: "graders.task_graders:MediumGrader"
    name: "Medium — Brand/Generic Duplicate"
    description: "Patient takes Ultram (brand name for tramadol) at home. Hospital prescribes tramadol by generic name. Agent must recognize brand/generic equivalence."
    difficulty: "medium"

  - id: "hard"
    grader: "graders.task_graders:HardGrader"
    name: "Hard — Three Hidden Issues"
    description: "Three life-threatening issues: Coumadin+aspirin interaction, digoxin dose doubled, metoprolol missing from discharge. Agent must find all three."
    difficulty: "hard"
