spec_version: 1
name: med_reconciliation
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: "easy"
    description: "Patient on warfarin has it listed twice in discharge. Agent must identify the duplicate medication before it causes fatal bleeding."
    grader: "graders.graders.grade_episode"

  - id: "medium"
    description: "Patient takes Ultram (brand) at home, hospital prescribes tramadol (generic). Agent must recognize brand/generic equivalence to catch the dangerous duplicate."
    grader: "graders.graders.grade_episode"

  - id: "hard"
    description: "Three hidden issues: Coumadin+aspirin interaction, digoxin dose doubled, metoprolol missing. Agent must identify all three life-threatening discrepancies."
    grader: "graders.graders.grade_episode"
